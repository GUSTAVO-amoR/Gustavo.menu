<style>
  :root{
    --ink:#0b3d5c;
    --ink-soft:#2f5c7a;
    --celeste:#bfe6f5;
    --celeste-soft:#e3f4fa;
    --white:#fbfeff;
    --line:rgba(11,61,92,0.18);
    --danger:#b3402f;
    --success:#2f7a4f;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Jost', sans-serif;
    background:linear-gradient(180deg,var(--white) 0%,var(--celeste-soft) 100%);
    color:var(--ink);
    min-height:100vh;
  }
  h1,h2,h3{font-family:'Cormorant Garamond',serif; margin:0;}
  button{font-family:inherit; cursor:pointer;}
  input,textarea,select{font-family:inherit;}

  .login-screen{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;}
  .login-box{
    background:var(--white); border:1px solid var(--line); border-radius:16px;
    padding:40px 34px; width:100%; max-width:380px; box-shadow:0 20px 50px rgba(11,61,92,0.12);
    text-align:center;
  }
  .login-box h1{font-size:2rem; margin-bottom:4px;}
  .login-box .sub{font-size:0.78rem; letter-spacing:2px; text-transform:uppercase; color:var(--ink-soft); margin-bottom:28px;}
  .field{margin-bottom:16px; text-align:left;}
  .field label{display:block; font-size:0.72rem; letter-spacing:1px; text-transform:uppercase; color:var(--ink-soft); margin-bottom:6px;}
  .field input, .field textarea, .field select{
    width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:8px;
    background:var(--white); color:var(--ink); font-size:0.92rem; outline:none;
  }
  .field input:focus, .field textarea:focus, .field select:focus{border-color:var(--ink-soft);}
  .btn{display:inline-block; border:none; border-radius:999px; padding:11px 22px; font-size:0.85rem; font-weight:600; letter-spacing:0.5px; transition:all .2s ease;}
  .btn-primary{background:var(--ink); color:var(--white); width:100%;}
  .btn-primary:hover{background:var(--ink-soft);}
  .btn-outline{background:transparent; border:1px solid var(--ink-soft); color:var(--ink-soft);}
  .btn-outline:hover{background:var(--celeste-soft);}
  .btn-danger{background:transparent; border:1px solid var(--danger); color:var(--danger); font-size:0.75rem; padding:7px 14px;}
  .btn-danger:hover{background:var(--danger); color:white;}
  .btn-small{font-size:0.75rem; padding:7px 14px; width:auto;}
  .login-error{color:var(--danger); font-size:0.82rem; margin-top:10px; min-height:18px;}

  .topbar{
    position:sticky; top:0; z-index:10;
    background:rgba(251,254,255,0.92); backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 24px;
  }
  .topbar h1{font-size:1.6rem;}
  .topbar .who{font-size:0.75rem; color:var(--ink-soft);}
  .tabs{display:flex; gap:6px; padding:16px 24px 0; flex-wrap:wrap; max-width:980px; margin:0 auto;}
  .tab-btn{background:transparent; border:1px solid var(--ink-soft); color:var(--ink-soft); border-radius:999px; padding:9px 18px; font-size:0.85rem; font-weight:500;}
  .tab-btn.active{background:var(--ink); color:var(--white); border-color:var(--ink);}
  .content{max-width:980px; margin:0 auto; padding:24px;}

  .card{background:var(--white); border:1px solid var(--line); border-radius:14px; padding:20px; margin-bottom:16px;}
  .card-head{display:flex; justify-content:space-between; align-items:flex-start; gap:12px; margin-bottom:10px;}
  .card-head h3{font-size:1.3rem;}
  .muted{color:var(--ink-soft); font-size:0.85rem;}
  .row{display:flex; gap:10px; flex-wrap:wrap; align-items:center;}
  .lang-tabs{display:flex; gap:6px; margin-bottom:12px; flex-wrap:wrap;}
  .lang-tab{background:var(--celeste-soft); border:1px solid var(--line); color:var(--ink-soft); border-radius:6px; padding:5px 10px; font-size:0.75rem; font-weight:600;}
  .lang-tab.active{background:var(--ink); color:var(--white); border-color:var(--ink);}
  .allergen-check{display:inline-flex; align-items:center; gap:4px; font-size:0.78rem; margin-right:10px; color:var(--ink-soft);}
  .item-photo{width:60px; height:60px; object-fit:cover; border-radius:8px; border:1px solid var(--line);}
  .item-photo-placeholder{width:60px; height:60px; border-radius:8px; border:1px dashed var(--line); display:flex; align-items:center; justify-content:center; color:var(--ink-soft); font-size:0.65rem; text-align:center;}
  .toast{position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--ink); color:white; padding:12px 22px; border-radius:999px; font-size:0.85rem; z-index:100; opacity:0; pointer-events:none; transition:opacity .3s ease;}
  .toast.show{opacity:1;}
  .toast.error{background:var(--danger);}

  .modal-overlay-generic{
    position:fixed; inset:0; background:rgba(11,61,92,0.4); z-index:200;
    display:flex; align-items:center; justify-content:center; padding:20px;
  }
  .modal-box{
    background:var(--white); border-radius:16px; padding:28px;
    width:100%; max-width:420px; box-shadow:0 20px 50px rgba(0,0,0,0.25);
  }
  .modal-error{color:var(--danger); font-size:0.82rem; min-height:16px; margin-top:6px;}
  .section-title{font-size:1.5rem; margin:28px 0 14px;}
  .section-title:first-child{margin-top:0;}
  .empty{color:var(--ink-soft); font-style:italic; text-align:center; padding:30px;}
  hr.sep{border:none; border-top:1px solid var(--line); margin:14px 0;}
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  @media (max-width:600px){ .grid2{grid-template-columns:1fr;} }
</style>
</head>

/* ========================================================================
   MODALI PERSONALIZZATE (al posto di prompt/confirm/alert nativi del browser)
   ======================================================================== */
function closeGenericModal(){
  const el = document.getElementById('genericModalOverlay');
  if(el) el.remove();
}

function showConfirmModal(message, onConfirm){
  closeGenericModal();
  const ov = document.createElement('div');
  ov.id = 'genericModalOverlay';
  ov.className = 'modal-overlay-generic';
  ov.innerHTML = `
    <div class="modal-box">
      <p style="margin:0 0 22px; font-size:0.95rem; color:var(--ink); line-height:1.5;">${message}</p>
      <div class="row" style="justify-content:flex-end;">
        <button class="btn btn-outline btn-small" onclick="closeGenericModal()">Annulla</button>
        <button class="btn btn-danger btn-small" id="genericModalConfirmBtn" style="border:none; background:var(--danger); color:#fff;">Conferma</button>
      </div>
    </div>
  `;
  document.body.appendChild(ov);
  document.getElementById('genericModalConfirmBtn').onclick = ()=>{ closeGenericModal(); onConfirm(); };
}

function showPromptModal(title, fields, onSubmit, submitLabel){
  closeGenericModal();
  const ov = document.createElement('div');
  ov.id = 'genericModalOverlay';
  ov.className = 'modal-overlay-generic';
  ov.innerHTML = `
    <div class="modal-box">
      <h3 style="margin:0 0 16px; font-size:1.3rem;">${title}</h3>
      ${fields.map(f=>`
        <div class="field">
          <label>${f.label}</label>
          <input type="text" id="${f.id}" placeholder="${f.placeholder||''}" value="${f.value||''}">
        </div>
      `).join('')}
      <div class="modal-error" id="genericModalError"></div>
      <div class="row" style="justify-content:flex-end; margin-top:6px;">
        <button class="btn btn-outline btn-small" onclick="closeGenericModal()">Annulla</button>
        <button class="btn btn-primary btn-small" id="genericModalSubmitBtn">${submitLabel||'Salva'}</button>
      </div>
    </div>
  `;
  document.body.appendChild(ov);
  document.getElementById('genericModalSubmitBtn').onclick = ()=>{
    const values = {};
    fields.forEach(f=> values[f.id] = document.getElementById(f.id).value.trim());
    onSubmit(values);
  };
}

/* ========================================================================
   TRADUZIONE AUTOMATICA (IT -> EN/ES/DE/FR)
   ---------------------------------------------------------------------
   Usa un servizio di traduzione automatica gratuito (MyMemory). E' un
   aiuto per non lasciare campi vuoti, ma resta una traduzione automatica:
   ricontrolla sempre i nomi propri dei piatti (es. "Negroni", "Mojito")
   che non andrebbero tradotti - puoi sempre correggerli a mano aprendo
   la lingua giusta.
   ======================================================================== */
async function translateFromIt(text, targetLang){
  if(!text || !text.trim()) return '';
  try{
    const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=it|${targetLang}`);
    const data = await res.json();
    return (data && data.responseData && data.responseData.translatedText) ? data.responseData.translatedText : text;
  }catch(e){
    console.error('Errore traduzione', e);
    return text;
  }
}

async function autoTranslateObj(obj, fieldNames){
  const targets = ['en','es','de','fr'];
  for(const field of fieldNames){
    const itText = obj[field] ? obj[field].it : '';
    if(!itText) continue;
    for(const lang of targets){
      obj[field][lang] = await translateFromIt(itText, lang);
    }
  }
}

async function init(){
  sb.auth.onAuthStateChange((event, sessionData)=>{
    if(event === 'PASSWORD_RECOVERY'){
      renderResetPassword();
    }
  });
  const { data } = await sb.auth.getSession();
  session = data.session;
  if(session){ await loadAll(); renderShell(); }
  else{ renderLogin(); }
}

function renderLogin(){
  app.innerHTML = `
    <div class="login-screen">
      <div class="login-box">
        <h1>Gustavo</h1>
        <div class="sub">Gestione Menu</div>
        <div class="field">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="admin@gustavo-menu.app">
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="••••••••">
        </div>
        <button class="btn btn-primary" onclick="doLogin()">Accedi</button>
        <button class="btn btn-outline" style="width:100%; margin-top:10px;" onclick="doSignup()">Crea il tuo account</button>
        <div style="margin-top:14px;">
          <a href="#" onclick="doForgotPassword(); return false;" style="font-size:0.78rem; color:var(--ink-soft); text-decoration:underline;">Password dimenticata?</a>
        </div>
        <div class="login-error" id="loginError"></div>
      </div>
    </div>
  `;
}

async function doLogin(){
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  errEl.textContent = '';
  if(!email || !password){ errEl.textContent = 'Inserisci email e password.'; return; }
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if(error){ errEl.textContent = 'Accesso non riuscito: ' + error.message; return; }
  session = data.session;
  await loadAll();
  renderShell();
}

async function doSignup(){
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  errEl.textContent = '';
  if(!email || password.length < 6){ errEl.textContent = 'Inserisci email e una password di almeno 6 caratteri.'; return; }
  const { data, error } = await sb.auth.signUp({ email, password });
  if(error){ errEl.textContent = 'Errore: ' + error.message; return; }
  if(data.session){
    session = data.session;
    await loadAll();
    renderShell();
  } else {
    errEl.style.color = 'var(--success)';
    errEl.textContent = 'Account creato! Controlla la tua email per confermare, poi torna qui e premi Accedi.';
  }
}

    errModal.textContent = 'Invio in corso…';
    const { error } = await sb.auth.resetPasswordForEmail(email, {
      redirectTo: 'https://gustavo-amor.github.io/Gustavo.menu/admin.html'
    });

    errEl.textContent = 'Controlla la tua email: ti abbiamo mandato un link per reimpostare la password.';

      <div class="login-box">
        <h1>Gustavo</h1>
        <div class="sub">Imposta una nuova password</div>
        <div class="field">

async function doSetNewPassword(){
  const password = document.getElementById('newPassword').value;
  const errEl = document.getElementById('loginError');
  errEl.style.color = '';
  if(password.length < 6){ errEl.textContent = 'La password deve avere almeno 6 caratteri.'; return; }

  if(error){ errEl.textContent = 'Errore: ' + error.message; return; }
  errEl.style.color = 'var(--success)';
  errEl.textContent = 'Password aggiornata! Reindirizzamento…';
  const { data } = await sb.auth.getSession();

  setTimeout(async ()=>{ await loadAll(); renderShell(); }, 1200);

async function doLogout(){
  await sb.auth.signOut();
  session = null;
  renderLogin();
}

async function loadAll(){
  const [catsRes, subsRes, itemsRes, venueRes] = await Promise.all([
    sb.from('categories').select('*').order('sort_order'),
    sb.from('subcategories').select('*').order('sort_order'),
    sb.from('menu_items').select('*').order('sort_order'),
    sb.from('venue_info').select('*').eq('id',1).maybeSingle()
  ]);
  categories = catsRes.data || [];
  subcategories = subsRes.data || [];
  menuItems = itemsRes.data || [];
  venueInfo = venueRes.data || { address:{}, hours:{}, phone:{} };
}

function renderShell(){
  app.innerHTML = `
    <div class="topbar">
      <h1>Gustavo <span style="font-size:0.9rem; color:var(--ink-soft);">· Gestione</span></h1>
      <div class="row">
        <span class="who">${session.user.email}</span>
        <button class="btn btn-outline btn-small" onclick="doLogout()">Esci</button>
      </div>
    </div>
    <div class="tabs" id="tabs"></div>
    <div class="content" id="tabContent"></div>
  `;
  renderTabs();
  renderTabContent();
}

function renderTabs(){
  const tabs = [
    {key:'items', label:'Piatti & Drink'},
    {key:'categories', label:'Categorie'},
    {key:'venue', label:'Info Locale'}
  ];
  document.getElementById('tabs').innerHTML = tabs.map(tb=>
    `<button class="tab-btn ${currentTab===tb.key?'active':''}" onclick="switchTab('${tb.key}')">${tb.label}</button>`
  ).join('');
}

function switchTab(key){
  currentTab = key;
  renderTabs();
  renderTabContent();
}

function renderTabContent(){
  const el = document.getElementById('tabContent');
  if(currentTab==='items') el.innerHTML = renderItemsTab();
  else if(currentTab==='categories') el.innerHTML = renderCategoriesTab();
  else if(currentTab==='venue') el.innerHTML = renderVenueTab();
}

function langTabsHTML(){
  return `<div class="lang-tabs">` + LANGS.map(l=>
    `<button class="lang-tab ${editLang===l?'active':''}" onclick="setEditLang('${l}')">${LANG_LABEL[l]}</button>`
  ).join('') + `</div>`;
}
function setEditLang(l){
  editLang = l;
  renderTabContent();
}

function renderItemsTab(){
  let html = langTabsHTML();
  html += `<p class="muted">Stai modificando i testi in <strong>${LANG_LABEL[editLang]}</strong>. Cambia lingua sopra per tradurre lo stesso piatto.</p>`;

  categories.forEach(cat=>{
    html += `<div class="section-title">${(cat.title[editLang]||cat.title.it)}</div>`;
    const subsOfCat = subcategories.filter(s=>s.category_id===cat.id);
    if(subsOfCat.length){
      subsOfCat.forEach(sub=>{
        html += `<h3 style="font-size:1.05rem; margin:14px 0 8px; color:var(--ink-soft);">${(sub.title[editLang]||sub.title.it)}</h3>`;
        html += renderItemsList(menuItems.filter(i=>i.subcategory_id===sub.id));
        html += `<button class="btn btn-outline btn-small" onclick="openItemForm(null,'${cat.id}','${sub.id}')">+ Aggiungi voce qui</button>`;
      });
    } else {
      html += renderItemsList(menuItems.filter(i=>i.category_id===cat.id && !i.subcategory_id));
      html += `<button class="btn btn-outline btn-small" onclick="openItemForm(null,'${cat.id}',null)">+ Aggiungi voce qui</button>`;
    }
  });

  html += `<div id="itemFormWrap"></div>`;
  return html;
}

function renderItemsList(items){
  if(!items.length) return `<p class="muted" style="margin:6px 0 12px;">Nessuna voce.</p>`;
  return items.map(it=>`
    <div class="card">
      <div class="card-head">
        <div class="row" style="gap:14px;">
          ${it.photo_url ? `<img class="item-photo" src="${it.photo_url}" alt="">` : `<div class="item-photo-placeholder">no foto</div>`}
          <div>
            <h3>${it.name[editLang]||it.name.it} ${it.recommended ? '<span style="font-size:0.7rem;color:var(--success);">★ consigliato</span>' : ''}</h3>
            ${it.group_label && it.group_label[editLang] ? `<p class="muted" style="font-weight:600; text-transform:uppercase; font-size:0.72rem; letter-spacing:1px;">${it.group_label[editLang]}</p>` : ''}
            <p class="muted">${it.ingredients[editLang]||it.ingredients.it}</p>
            <p class="muted">${it.price} ${it.allergens && it.allergens.length ? '· ' + it.allergens.join(', ') : ''}</p>
          </div>
        </div>
        <div class="row">
          <button class="btn btn-outline btn-small" onclick="openItemForm('${it.id}')">Modifica</button>
          <button class="btn btn-danger" onclick="deleteItem('${it.id}')">Elimina</button>
        </div>
      </div>
    </div>
  `).join('');
}

function openItemForm(itemId, catId, subId){
  const it = itemId ? JSON.parse(JSON.stringify(menuItems.find(i=>i.id===itemId))) : {
    id:null, category_id:catId, subcategory_id:subId,
    name:{it:'',en:'',es:'',de:'',fr:''}, ingredients:{it:'',en:'',es:'',de:'',fr:''},
    price:'', allergens:[], recommended:false, photo_url:null, group_label:{it:'',en:'',es:'',de:'',fr:''}
  };
  if(!it.group_label) it.group_label = {it:'',en:'',es:'',de:'',fr:''};
  window._editingItem = it;
  const wrap = document.getElementById('itemFormWrap');
  wrap.innerHTML = `
    <div class="card" style="border-color:var(--ink-soft);">
      <h3 style="margin-bottom:14px;">${itemId ? 'Modifica voce' : 'Nuova voce'}</h3>
      ${langTabsHTML()}
      <div class="field"><label>Nome (${LANG_LABEL[editLang]})</label><input id="f_name" value="${(it.name[editLang]||'').replace(/"/g,'&quot;')}"></div>
      <div class="field"><label>Ingredienti (${LANG_LABEL[editLang]})</label><textarea id="f_ingr" rows="2">${it.ingredients[editLang]||''}</textarea></div>
      <div class="field"><label>Sotto-gruppo (opzionale — es. "Rossi · Canari", "Gin")</label><input id="f_group" value="${(it.group_label[editLang]||'').replace(/"/g,'&quot;')}" placeholder="lascia vuoto se non serve"></div>
      <div class="grid2">
        <div class="field"><label>Prezzo</label><input id="f_price" value="${it.price||''}" placeholder="€9"></div>
        <div class="field"><label><input type="checkbox" id="f_recommended" ${it.recommended?'checked':''} style="width:auto;"> Consigliato</label></div>
      </div>
      <div class="field">
        <label>Allergeni</label>
        <div>${ALLERGENS.map(a=>`<label class="allergen-check"><input type="checkbox" value="${a}" ${it.allergens&&it.allergens.includes(a)?'checked':''} class="allergen-cb"> ${ALLERGEN_LABELS_IT[a]}</label>`).join('')}</div>
      </div>
      <div class="field">
        <label>Foto piatto</label>
        <input type="file" accept="image/*" id="f_photo">
        ${it.photo_url ? `<img class="item-photo" src="${it.photo_url}" style="margin-top:8px;">` : ''}
      </div>
      <div class="row" style="margin-top:16px;">
        <button class="btn btn-primary btn-small" onclick="saveItem('${itemId||''}','${it.category_id}','${it.subcategory_id||''}')">Salva</button>
        <button class="btn btn-outline btn-small" onclick="closeItemForm()">Annulla</button>
      </div>
    </div>
  `;
  wrap.scrollIntoView({behavior:'smooth'});
}
function closeItemForm(){ document.getElementById('itemFormWrap').innerHTML = ''; }

async function saveItem(itemId, catId, subId){
  const it = window._editingItem;
  it.name[editLang] = document.getElementById('f_name').value.trim();
  it.ingredients[editLang] = document.getElementById('f_ingr').value.trim();
  it.group_label[editLang] = document.getElementById('f_group').value.trim();
  it.price = document.getElementById('f_price').value.trim();
  it.recommended = document.getElementById('f_recommended').checked;
  it.allergens = [...document.querySelectorAll('.allergen-cb:checked')].map(c=>c.value);

  if(editLang === 'it'){
    showToast('Traduzione automatica in corso…');
    await autoTranslateObj(it, ['name','ingredients']);
    if(it.group_label.it){
      await autoTranslateObj(it, ['group_label']);
    } else {
      ['en','es','de','fr'].forEach(l=> it.group_label[l] = '');
    }
  }

  const photoInput = document.getElementById('f_photo');
  let photo_url = it.photo_url || null;
  if(photoInput.files && photoInput.files[0]){
    photo_url = await uploadItemPhoto(photoInput.files[0]);
    if(!photo_url){ showToast('Errore caricamento foto', true); return; }
  }

  const group_label_payload = it.group_label.it ? it.group_label : null;

  const payload = {
    category_id: catId,
    subcategory_id: subId || null,
    name: it.name, ingredients: it.ingredients, price: it.price,
    allergens: it.allergens, recommended: it.recommended, photo_url,
    group_label: group_label_payload
  };

  let error;
  if(itemId){
    ({ error } = await sb.from('menu_items').update(payload).eq('id', itemId));
  } else {
    payload.sort_order = (menuItems.filter(m=>m.category_id===catId).length+1)*10;
    ({ error } = await sb.from('menu_items').insert(payload));
  }
  if(error){ showToast('Errore: ' + error.message, true); return; }
  showToast('Salvato con successo');
  closeItemForm();
  await loadAll();
  renderTabContent();
}

async function uploadItemPhoto(file){
  return new Promise((resolve)=>{
    const reader = new FileReader();
    reader.onload = e=>{
      const img = new Image();
      img.onload = ()=>{
        const canvas = document.createElement('canvas');
        const maxW = 900;
        const scale = Math.min(1, maxW/img.width);
        canvas.width = img.width*scale; canvas.height = img.height*scale;
        canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
        canvas.toBlob(async (blob)=>{
          const fname = `item_${Date.now()}_${Math.random().toString(36).slice(2)}.jpg`;
          const { error } = await sb.storage.from('menu-photos').upload(fname, blob, {contentType:'image/jpeg'});
          if(error){ resolve(null); return; }
          const { data } = sb.storage.from('menu-photos').getPublicUrl(fname);
          resolve(data.publicUrl);
        }, 'image/jpeg', 0.8);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function deleteItem(id){

function renderCategoriesTab(){
  let html = langTabsHTML();
  html += `<p class="muted">Stai modificando i nomi in <strong>${LANG_LABEL[editLang]}</strong>.</p>`;

  const catsSorted = [...categories].sort((a,b)=>a.sort_order-b.sort_order);

    html += `<div class="card">

        <div class="row" style="gap:4px;">
          <button class="btn btn-outline btn-small" style="width:auto; padding:6px 10px;" onclick="moveCategory('${cat.id}',-1)" ${idx===0?'disabled':''} title="Sposta su">↑</button>
          <button class="btn btn-outline btn-small" style="width:auto; padding:6px 10px;" onclick="moveCategory('${cat.id}',1)" ${idx===catsSorted.length-1?'disabled':''} title="Sposta giù">↓</button>
        </div>
        <div class="field" style="flex:1;"><input id="cat_name_${cat.id}" value="${(cat.title[editLang]||'').replace(/"/g,'&quot;')}"></div>
        <button class="btn btn-primary btn-small" style="width:auto;" onclick="renameCategory('${cat.id}', document.getElementById('cat_name_${cat.id}').value)">Salva</button>
        <button class="btn btn-danger" onclick="deleteCategory('${cat.id}')">Elimina categoria</button>
      </div>
      <p class="muted">Chiave interna: ${cat.key}</p>
      <hr class="sep">
      <h3 style="font-size:1rem;">Sottocategorie</h3>
      ${subsOfCat.map((s,sidx)=>`
        <div class="row" style="margin:6px 0;">
          <button class="btn btn-outline btn-small" style="width:auto; padding:6px 10px;" onclick="moveSubcategory('${s.id}',-1)" ${sidx===0?'disabled':''} title="Sposta su">↑</button>
          <button class="btn btn-outline btn-small" style="width:auto; padding:6px 10px;" onclick="moveSubcategory('${s.id}',1)" ${sidx===subsOfCat.length-1?'disabled':''} title="Sposta giù">↓</button>
          <input id="sub_name_${s.id}" value="${(s.title[editLang]||'').replace(/"/g,'&quot;')}" style="flex:1; padding:8px; border:1px solid var(--line); border-radius:6px;">
          <button class="btn btn-primary btn-small" style="width:auto;" onclick="renameSubcategory('${s.id}', document.getElementById('sub_name_${s.id}').value)">Salva</button>
          <button class="btn btn-danger" onclick="deleteSubcategory('${s.id}')">Elimina</button>
        </div>
      `).join('')}
      <button class="btn btn-outline btn-small" style="margin-top:8px;" onclick="addSubcategory('${cat.id}')">+ Nuova sottocategoria</button>
    </div>`;
  });

  html += `<button class="btn btn-primary" style="width:auto;" onclick="addCategory()">+ Nuova categoria</button>`;
  return html;
}

async function moveCategory(id, direction){
  const sorted = [...categories].sort((a,b)=>a.sort_order-b.sort_order);
  const idx = sorted.findIndex(c=>c.id===id);
  const swapIdx = idx + direction;
  if(swapIdx < 0 || swapIdx >= sorted.length) return;
  const a = sorted[idx], b = sorted[swapIdx];
  const tmp = a.sort_order;
  const { error: e1 } = await sb.from('categories').update({sort_order: b.sort_order}).eq('id', a.id);
  const { error: e2 } = await sb.from('categories').update({sort_order: tmp}).eq('id', b.id);
  if(e1 || e2){ showToast('Errore: ' + ((e1||e2).message), true); return; }
  showToast('Ordine aggiornato');
  await loadAll();
  renderTabContent();
}

async function moveSubcategory(id, direction){
  const sub = subcategories.find(s=>s.id===id);
  const siblings = subcategories.filter(s=>s.category_id===sub.category_id).sort((a,b)=>a.sort_order-b.sort_order);
  const idx = siblings.findIndex(s=>s.id===id);
  const swapIdx = idx + direction;
  if(swapIdx < 0 || swapIdx >= siblings.length) return;
  const a = siblings[idx], b = siblings[swapIdx];
  const tmp = a.sort_order;
  const { error: e1 } = await sb.from('subcategories').update({sort_order: b.sort_order}).eq('id', a.id);
  const { error: e2 } = await sb.from('subcategories').update({sort_order: tmp}).eq('id', b.id);
  if(e1 || e2){ showToast('Errore: ' + ((e1||e2).message), true); return; }
  showToast('Ordine aggiornato');
  await loadAll();
  renderTabContent();
}

async function renameCategory(id, value){
  const cat = categories.find(c=>c.id===id);
  cat.title[editLang] = value;
  if(editLang === 'it'){
    showToast('Traduzione automatica in corso…');
    await autoTranslateObj(cat, ['title']);
  }
  const { error } = await sb.from('categories').update({title:cat.title}).eq('id', id);
  if(error){ showToast('Errore: '+error.message, true); return; }
  showToast('Categoria aggiornata');
  await loadAll();
}

async function deleteCategory(id){
  showConfirmModal('Eliminare questa categoria? Verranno eliminati anche tutti i piatti e le sottocategorie al suo interno.', async ()=>{

    if(error){ showToast('Errore: '+error.message, true); return; }
    showToast('Categoria eliminata');
    await loadAll();

  });
}

async function saveVenue(){
  const address = venueInfo.address || {};
  const hours = venueInfo.hours || {};
  const phone = venueInfo.phone || {};
  address[editLang] = document.getElementById('v_address').value.trim();
  hours[editLang] = document.getElementById('v_hours').value.trim();
  phone[editLang] = document.getElementById('v_phone').value.trim();
  if(editLang === 'it'){
    showToast('Aggiornamento in corso…');
    // L'indirizzo NON va tradotto (è un nome proprio/via) - si copia identico
    ['en','es','de','fr'].forEach(l=> address[l] = address.it);
    const wrapper = { hours, phone };
    await autoTranslateObj(wrapper, ['hours','phone']);
  }
  const { error } = await sb.from('venue_info').update({address, hours, phone}).eq('id',1);
  if(error){ showToast('Errore: '+error.message, true); return; }
  showToast('Info locale aggiornate');
  await loadAll();
  renderTabContent();
}
