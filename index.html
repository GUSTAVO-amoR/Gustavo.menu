<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GUSTAVO — Menu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Jost:wght@300;400;500;600;700&family=Playball&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0b3d5c;
    --ink-soft:#1f4b68;
    --celeste:#bfe6f5;
    --celeste-soft:#e3f4fa;
    --white:#fbfeff;
    --line:rgba(11,61,92,0.18);
    --shadow: 0 10px 30px rgba(11,61,92,0.10);
    --shadow-hover: 0 16px 40px rgba(11,61,92,0.18);
    --ease: cubic-bezier(0.22, 1, 0.36, 1);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Jost', sans-serif;
    background: linear-gradient(180deg, var(--white) 0%, var(--celeste-soft) 55%, var(--celeste) 100%);
    color:var(--ink);
    min-height:100vh;
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }
  #app{
    max-width:520px;
    margin:0 auto;
    min-height:100vh;
    position:relative;
    display:flex;
    flex-direction:column;
  }

  /* ---------- splash di benvenuto ---------- */
  .splash-screen{
    position:fixed; inset:0; z-index:100;
    display:flex; align-items:center; justify-content:center;
    background: linear-gradient(180deg, var(--white) 0%, var(--celeste-soft) 55%, var(--celeste) 100%);
    transition:opacity 0.8s ease;
    padding:20px; text-align:center;
    overflow-y:auto;
  }
  .splash-screen.hide{ opacity:0; pointer-events:none; }
  .splash-content{
    display:flex; flex-direction:column; align-items:center; gap:30px;
  }
  .splash-lang-row{
    display:flex; gap:10px; flex-wrap:wrap; justify-content:center;
    animation: splashIn 0.9s ease 0.25s both;
  }
  .splash-lang-btn{
    font-family:'Jost'; font-weight:500; font-size:0.82rem; letter-spacing:1px;
    color:#60a5f7;
    background:var(--white);
    border:1.5px solid #60a5f7;
    border-radius:999px;
    padding:10px 20px;
    cursor:pointer;
    transition:all .3s var(--ease);
  }
  .splash-lang-btn:hover{
    background:#60a5f7; color:var(--white);
    transform:scale(1.15);
    box-shadow:0 8px 22px rgba(96,165,247,0.35);
  }
  .splash-loading{
    font-family:'Jost'; color:var(--ink-soft); font-size:1.4rem; letter-spacing:3px;
    animation: pulseOpacity 1.2s ease-in-out infinite;
  }
  @keyframes pulseOpacity{
    0%,100%{ opacity:0.3; } 50%{ opacity:0.9; }
  }
  .splash-logo{
    width:min(88vw, 400px);
    height:auto;
    animation: splashIn 0.9s ease 0.15s both;
  }
  @keyframes splashIn{
    from{opacity:0; transform:translateY(8px);}
    to{opacity:1; transform:translateY(0);}
  }

  /* ---------- language switcher ---------- */
  .lang-switcher{
    position:absolute; top:14px; right:14px;
    z-index:30;
    display:flex; gap:4px;
    background:rgba(251,254,255,0.7);
    border:1px solid var(--line);
    border-radius:999px;
    padding:3px;
  }
  .lang-switcher button{
    border:none; background:transparent; cursor:pointer;
    font-family:'Jost'; font-size:0.72rem; font-weight:600; letter-spacing:0.5px;
    color:var(--ink-soft);
    padding:8px 10px; border-radius:999px;
    min-height:36px; min-width:36px;
  }
  .lang-switcher button:focus-visible{
    outline:2px solid var(--ink);
    outline-offset:1px;
  }
  .lang-switcher button.active{
    background:var(--ink); color:var(--white);
  }

  /* ---------- HEADER (category screen) ---------- */
  header.topbar{
    position:sticky; top:0; z-index:20;
    background:rgba(251,254,255,0.86);
    backdrop-filter: blur(8px);
    border-bottom:1px solid var(--line);
    display:flex; align-items:center; gap:12px;
    padding:14px 18px;
  }
  header.topbar button.back{
    background:none;border:none;cursor:pointer;
    color:var(--ink); font-family:'Jost';font-size:0.95rem;
    display:flex;align-items:center;gap:6px;padding:4px 0;
  }
  header.topbar button.back svg{width:18px;height:18px;}
  .mini-brand{
    margin-left:auto;
    display:flex; flex-direction:column; align-items:flex-end;
    line-height:1;
  }
  .mini-brand-logo{
    width:74px; height:auto;
    display:block;
  }
  .mini-brand-sub{
    font-family:'Jost'; font-size:0.52rem; letter-spacing:1px;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin-top:2px;
    white-space:nowrap;
  }

  .section-title-top{
    text-align:center;
    padding:20px 46px 2px;
  }
  .title-caps{
    font-family:'Cormorant Garamond', serif;
    font-weight:700;
    font-size:2.5rem;
    letter-spacing:3px;
    text-transform:uppercase;
    color:var(--ink);
  }
  .title-script{
    font-family:'Playball', cursive;
    font-size:1.9rem;
    line-height:1;
    color:var(--ink);
    margin-top:-6px;
    transform:rotate(-3deg);
  }

  /* ---------- HOME SCREEN ---------- */
  .home{
    flex:1; display:flex; flex-direction:column;
    position:relative; z-index:1;
    height:100vh;
    height:100svh;
    overflow-y:auto;
  }
  .home-inner{
    flex:1;
    display:flex; flex-direction:column; align-items:flex-start; justify-content:space-between;
    padding:clamp(16px, 4vh, 40px) 30px 10px;
    text-align:left;
  }
  .brand-logo{
    width:min(78vw, 340px);
    max-height:20vh;
    height:auto;
    margin-bottom:2px;
    flex-shrink:0;
  }
  .brand-tagline{
    font-family:'Jost', sans-serif;
    font-size:0.75rem;
    letter-spacing:4px;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin:2px 0;
    flex-shrink:0;
    text-align:left;
  }
  .section-grid{
    width:100%;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:clamp(8px, 2vh, 16px);
    flex-shrink:1;
  }
  .section-grid .section-card:last-child:nth-child(odd){
    grid-column:1 / -1;
  }
  .section-card{
    background:var(--white);
    border:1px solid var(--line);
    border-radius:16px;
    padding:clamp(12px, 3vh, 26px) 10px clamp(10px, 2vh, 20px);
    box-shadow:var(--shadow);
    cursor:pointer;
    display:flex; flex-direction:column; align-items:center; gap:clamp(4px, 1.2vh, 10px);
    transition:transform .35s var(--ease), box-shadow .35s var(--ease), border-color .35s var(--ease);
    position:relative; z-index:1;
    font:inherit;
    min-height:44px;
    width:100%;
  }
  .section-card:hover{
    transform:translateY(-4px) scale(1.015);
    box-shadow:var(--shadow-hover);
    border-color:var(--ink-soft);
  }
  .section-card:hover svg{ transform:scale(1.18) rotate(-6deg); color:#1a7ba8; }
  .section-card:active{transform:translateY(-1px) scale(0.96);}
  .section-card:focus-visible{
    outline:3px solid var(--ink);
    outline-offset:3px;
  }
  .section-card svg{width:clamp(36px, 6.5vh, 52px); height:clamp(36px, 6.5vh, 52px); transition:transform .35s var(--ease), color .35s ease; color:var(--ink);}
  .section-card .label{
    font-family:'Cormorant Garamond', serif;
    font-size:clamp(1.15rem, 3.6vh, 1.55rem); font-weight:700; letter-spacing:2.8px;
    color:var(--ink);
  }
  .home-footnote{
    margin-top:clamp(10px, 2.5vh, 34px); font-size:0.68rem; letter-spacing:1.5px;
    color:var(--ink-soft); text-transform:uppercase; opacity:0.7;
    flex-shrink:0;
    text-align:center;
    width:100%;
  }
  .venue-info{
    width:100%;
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:clamp(8px, 2vh, 20px) 12px;
    padding:clamp(16px, 4vh, 32px) 22px;
    background:rgba(11,61,92,0.05);
    border-top:1px solid var(--line);
    flex-shrink:0;
  }
  @media (max-width:460px){
    .venue-info{ grid-template-columns:1fr; gap:10px; }
  }
  .storia-link-inline{
    background:var(--ink);
    color:var(--white);
    border:none;
    font-family:'Jost'; font-weight:500; font-size:0.76rem; letter-spacing:1.8px;
    text-transform:uppercase;
    padding:9px 18px;
    border-radius:999px;
    margin:4px 0 10px;
    cursor:pointer;
    transition:background-color .3s ease, transform .3s var(--ease);
    flex-shrink:0;
  }
  .storia-link-inline:hover{
    background:var(--ink-soft);
    transform:translateY(-1px);
  }
  .home-links-row{
    display:flex; gap:10px; flex-wrap:wrap;
    margin:4px 0 10px;
  }
  .item-crumb{
    font-family:'Jost'; font-size:0.68rem; letter-spacing:1.2px; text-transform:uppercase;
    color:var(--ink-soft); opacity:0.7; margin:0 0 3px;
  }

  /* ---------- disclaimer allergeni / nota vini ---------- */
  .allergen-disclaimer{
    font-family:'Jost'; font-size:0.72rem; line-height:1.5;
    color:var(--ink-soft);
    text-align:center;
    padding:10px 14px;
    border:1px solid var(--line);
    border-radius:10px;
    background:rgba(11,61,92,0.03);
    margin-bottom:16px;
  }
  .wine-pairing-note{
    font-family:'Cormorant Garamond', serif; font-style:italic;
    font-size:1.02rem;
    color:var(--ink);
    text-align:center;
    padding:12px 16px;
    border-top:1px solid var(--line);
    border-bottom:1px solid var(--line);
    margin-bottom:16px;
  }

  /* ---------- recensioni ---------- */
  .stars-row{ display:flex; gap:4px; }
  .star-static, .star-btn{
    width:20px; height:20px; color:var(--ink); opacity:0.85;
  }
  .star-static.filled, .star-btn.filled{ opacity:1; }
  .star-static:not(.filled), .star-btn:not(.filled){ opacity:0.28; }
  .star-btn{
    background:none; border:none; padding:0; cursor:pointer;
    transition:transform .2s var(--ease);
  }
  .star-btn:hover{ transform:scale(1.15); }

  .review-summary{
    display:flex; flex-direction:column; align-items:center; gap:6px;
    padding-bottom:22px; margin-bottom:22px;
    border-bottom:1px solid var(--line);
    text-align:center;
  }
  .review-summary .stars-row{ justify-content:center; }
  .review-avg-text{
    font-family:'Cormorant Garamond', serif; font-size:1.1rem;
    color:var(--ink-soft);
  }

  .review-form{
    border:1px solid var(--line);
    border-radius:14px;
    padding:22px;
    margin-bottom:30px;
    background:rgba(11,61,92,0.02);
  }
  .review-form-title{
    font-family:'Cormorant Garamond', serif; font-weight:700; font-size:1.25rem;
    color:var(--ink); margin:0 0 14px;
  }
  .review-label{
    display:block;
    font-family:'Jost'; font-size:0.7rem; letter-spacing:1.5px; text-transform:uppercase;
    color:var(--ink-soft);
    margin:14px 0 6px;
  }
  .review-input, .review-textarea{
    width:100%;
    font-family:'Jost'; font-size:0.9rem;
    color:var(--ink);
    background:var(--white);
    border:1px solid var(--line);
    border-radius:10px;
    padding:10px 12px;
    outline:none;
    resize:vertical;
    transition:border-color .3s ease;
  }
  .review-input:focus, .review-textarea:focus{ border-color:var(--ink-soft); }
  .review-file{ font-family:'Jost'; font-size:0.8rem; color:var(--ink-soft); }
  .review-photo-preview img{
    max-width:140px; border-radius:10px; margin-top:10px; display:block;
  }
  .review-submit{
    width:100%;
    margin-top:18px;
    background:var(--ink);
    color:var(--white);
    border:none;
    font-family:'Jost'; font-weight:600; font-size:0.85rem; letter-spacing:1.5px;
    text-transform:uppercase;
    padding:13px;
    border-radius:999px;
    cursor:pointer;
    transition:background-color .3s ease, transform .3s var(--ease);
  }
  .review-submit:hover{ background:var(--ink-soft); transform:translateY(-1px); }

  .review-list{ display:flex; flex-direction:column; gap:20px; }
  .review-card{
    border:1px solid var(--line);
    border-radius:14px;
    padding:18px;
  }
  .review-head{
    display:flex; justify-content:space-between; align-items:flex-start; gap:10px;
    margin-bottom:8px;
  }
  .review-name{
    font-family:'Cormorant Garamond', serif; font-weight:700; font-size:1.15rem;
    color:var(--ink); margin:0 0 4px;
  }
  .review-date{
    font-family:'Jost'; font-size:0.68rem; color:var(--ink-soft); opacity:0.7; white-space:nowrap;
  }
  .review-photo{
    width:100%; max-height:220px; object-fit:cover;
    border-radius:10px; margin:10px 0;
  }
  .review-text{
    font-family:'Cormorant Garamond', serif; font-size:1.05rem; font-style:italic;
    color:var(--ink-soft); line-height:1.5; margin:8px 0 12px;
  }
  .helpful-btn{
    font-family:'Jost'; font-size:0.75rem; font-weight:600; letter-spacing:0.8px;
    color:var(--ink-soft);
    background:transparent;
    border:1px solid var(--ink-soft);
    border-radius:999px;
    padding:7px 14px;
    cursor:pointer;
    transition:all .25s ease;
  }
  .helpful-btn:hover:not(:disabled){ background:var(--ink); color:var(--white); border-color:var(--ink); }
  .helpful-btn.voted, .helpful-btn:disabled{
    background:var(--celeste-soft); color:var(--ink); border-color:var(--line); cursor:default;
  }
  .venue-info .info-col{ text-align:center; }
  .venue-info .info-label{
    font-family:'Cormorant Garamond', serif;
    font-weight:600; font-size:0.9rem;
    letter-spacing:3px; text-transform:uppercase;
    color:var(--ink);
    margin-bottom:6px;
  }
  .venue-info .info-line{
    font-family:'Jost'; font-size:0.86rem;
    color:var(--ink-soft);
    line-height:1.5;
  }
  .venue-info .info-line.placeholder{ font-style:italic; opacity:0.8; }

  /* ---------- CATEGORY SCREEN ---------- */
  .screen{
    flex:1; position:relative; z-index:1;
    display:flex; flex-direction:column;
    min-height:100vh;
  }
  .content-col{
    flex:1;
    padding:6px 30px 34px;
    min-width:0;
  }

  .chip-row{
    display:flex; gap:8px; flex-wrap:wrap; margin:18px 0 22px;
    justify-content:center;
  }
  .chip{
    font-family:'Jost'; font-weight:500; font-size:0.88rem; letter-spacing:0.5px;
    padding:11px 18px; border-radius:999px;
    border:1px solid var(--ink-soft);
    background:transparent; color:var(--ink-soft);
    cursor:pointer; transition:all .25s var(--ease);
    min-height:44px;
  }
  .chip:hover{ background:rgba(191,230,245,0.4); }
  .chip:active{ transform:scale(0.94); }
  .chip.active{
    background:var(--ink); color:var(--white); border-color:var(--ink);
    transform:scale(1.04);
  }
  .chip:focus-visible{
    outline:3px solid var(--ink);
    outline-offset:2px;
  }

  .item-list{display:flex; flex-direction:column;}
  .item{
    padding:18px 4px;
    margin:0 -4px;
    border-radius:12px;
    border-bottom:1px dashed var(--line);
    display:flex; justify-content:space-between; align-items:center; gap:14px;
    animation: fadein 0.5s var(--ease) both;
    cursor:pointer;
    transition:background-color .3s var(--ease), transform .25s var(--ease);
    -webkit-tap-highlight-color:transparent;
  }
  .item:last-child{border-bottom:none;}
  .item:hover{ background-color:rgba(191,230,245,0.35); }
  .item.tapped{ transform:scale(0.985); background-color:rgba(191,230,245,0.55); }
  .item-main{flex:1; min-width:0;}
  .item-name{
    font-family:'Cormorant Garamond', serif;
    font-weight:600; font-size:1.28rem;
    color:var(--ink);
    margin:0 0 4px;
    transition:color .25s ease;
  }
  .item-ingredients{
    font-family:'Cormorant Garamond', serif;
    font-style:italic; font-weight:400;
    font-size:1.05rem;
    color:var(--ink-soft);
    line-height:1.4;
    margin:0;
  }
  .item-price{
    font-family:'Jost'; font-weight:600; font-size:0.85rem;
    color:var(--ink); white-space:nowrap;
    background:var(--celeste-soft);
    border:1px solid var(--line);
    padding:6px 12px;
    border-radius:999px;
    transition:background-color .3s ease, transform .3s var(--ease);
  }
  .item:hover .item-price{ background:var(--celeste); transform:scale(1.05); }

  .badge-recommended{
    display:inline-block;
    font-family:'Jost'; font-weight:600; font-size:0.6rem;
    letter-spacing:1px; text-transform:uppercase;
    color:var(--white);
    background:#c9782f;
    padding:3px 8px;
    border-radius:999px;
    margin-left:8px;
    vertical-align:middle;
    position:relative; top:-1px;
  }
  .allergen-row{
    display:flex; gap:6px; margin-top:6px;
  }
  .allergen-icon{
    display:inline-flex; align-items:center; justify-content:center;
    width:18px; height:18px;
    color:var(--ink-soft);
    opacity:0.6;
  }
  .allergen-icon svg{ width:100%; height:100%; }

  @keyframes fadein{
    from{opacity:0; transform:translate(-14px, 4px);}
    to{opacity:1; transform:translate(0,0);}
  }
  @keyframes screenIn{
    from{opacity:0; transform:translateY(10px) scale(0.995);}
    to{opacity:1; transform:translateY(0) scale(1);}
  }
  #screen-root > *{ animation: screenIn 0.45s var(--ease) both; }

  .empty-note{
    font-family:'Cormorant Garamond', serif; font-style:italic;
    color:var(--ink-soft); font-size:1.05rem; text-align:center; padding:40px 10px;
  }
  .closing-note{
    font-family:'Cormorant Garamond', serif; font-style:italic;
    color:var(--ink-soft); font-size:1rem; text-align:center;
    margin-top:30px; padding-top:20px; border-top:1px solid var(--line);
  }
  .storia-text{
    font-family:'Cormorant Garamond', serif;
    font-size:1.25rem; line-height:1.7;
    color:var(--ink-soft);
    text-align:center;
    max-width:440px; margin:20px auto 0;
  }

  ::-webkit-scrollbar{display:none;}

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important; }
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<div id="app">
  <main id="screen-root"></main>
  <div class="splash-screen" id="splash">
    <div class="splash-content">
      <img class="splash-logo" id="splashLogo" alt="Gustavo">
      <div class="splash-lang-row" id="splashLangRow"></div>
    </div>
  </div>

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* MENU e VENUE partono vuoti: vengono riempiti da Supabase al caricamento */
let MENU = {};
let VENUE = { address: "", hours: "", phone: "" };
let DATA_READY = false;

async function loadMenuData(){
  const [catsRes, subsRes, itemsRes, venueRes] = await Promise.all([
    sb.from('categories').select('*').order('sort_order'),
    sb.from('subcategories').select('*').order('sort_order'),
    sb.from('menu_items').select('*').order('sort_order'),
    sb.from('venue_info').select('*').eq('id', 1).maybeSingle()
  ]);

  if(catsRes.error) throw catsRes.error;
  if(subsRes.error) throw subsRes.error;
  if(itemsRes.error) throw itemsRes.error;

  const cats = catsRes.data || [];
  const subs = subsRes.data || [];
  const items = itemsRes.data || [];

  const menu = {};
  cats.forEach(cat=>{
    menu[cat.key] = { icon: cat.icon, title: cat.title };
  });
  subs.forEach(sub=>{
    const cat = cats.find(c=>c.id === sub.category_id);
    if(!cat) return;
    if(!menu[cat.key].subcategories) menu[cat.key].subcategories = {};
    menu[cat.key].subcategories[sub.key] = { title: sub.title, items: [] };
  });
  items.forEach(it=>{
    const cat = cats.find(c=>c.id === it.category_id);
    if(!cat) return;
    const itemObj = {
      name: it.name, ingredients: it.ingredients, price: it.price,
      allergens: it.allergens || [], recommended: it.recommended
    };
    if(it.subcategory_id){
      const sub = subs.find(s=>s.id === it.subcategory_id);
      if(sub && menu[cat.key].subcategories && menu[cat.key].subcategories[sub.key]){
        menu[cat.key].subcategories[sub.key].items.push(itemObj);
      }
    } else {
      if(!menu[cat.key].items) menu[cat.key].items = [];
      menu[cat.key].items.push(itemObj);
    }
  });

  MENU = menu;
  if(venueRes.data){ VENUE = venueRes.data; }
  DATA_READY = true;
}

const REVIEWS_VOTED_KEY = 'gustavo_reviews_voted_v1'; // solo per evitare doppio voto dallo stesso telefono
let reviewFormRating = 5;
let reviewFormPhotoBlob = null;
let reviewsCache = [];
let reviewsLoaded = false;

async function loadReviewsFromDB(){
  const { data, error } = await sb
    .from('reviews')
    .select('*')
    .order('helpful_count', { ascending: false })
    .order('created_at', { ascending: false });
  if(error){ console.error('Errore caricamento recensioni:', error); reviewsCache = []; }
  else { reviewsCache = data || []; }
  reviewsLoaded = true;
}

function getVotedSet(){
  try{
    const raw = localStorage.getItem(REVIEWS_VOTED_KEY);
    return raw ? new Set(JSON.parse(raw)) : new Set();
  }catch(e){ return new Set(); }
}
function saveVotedSet(set){
  try{ localStorage.setItem(REVIEWS_VOTED_KEY, JSON.stringify([...set])); }catch(e){}
}

function starSVG(filled){
  return `<svg viewBox="0 0 24 24" ${filled ? 'fill="currentColor" stroke="currentColor"' : 'fill="none" stroke="currentColor"'} stroke-width="1.3"><path d="M12 3.5l2.6 5.6 6.1.6-4.6 4.1 1.3 6-5.4-3.2-5.4 3.2 1.3-6-4.6-4.1 6.1-.6z"/></svg>`;
}

function renderStars(rating, interactive){
  let html = `<div class="stars-row" ${interactive ? 'id="starInput"' : ''}>`;
  for(let i=1;i<=5;i++){
    const filled = i <= Math.round(rating);
    if(interactive){
      html += `<button type="button" class="star-btn ${filled?'filled':''}" onclick="setReviewRating(${i})" aria-label="${i} stelle">${starSVG(filled)}</button>`;
    } else {
      html += `<span class="star-static ${filled?'filled':''}">${starSVG(filled)}</span>`;
    }
  }
  html += '</div>';
  return html;
}

function setReviewRating(n){
  reviewFormRating = n;
  const el = document.getElementById('starInput');
  if(el){ el.outerHTML = renderStars(n, true); }
}

function onReviewPhotoChange(input){
  const file = input.files && input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    const img = new Image();
    img.onload = function(){
      const canvas = document.createElement('canvas');
      const maxW = 900;
      const scale = Math.min(1, maxW / img.width);
      canvas.width = img.width * scale;
      canvas.height = img.height * scale;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      canvas.toBlob(function(blob){
        reviewFormPhotoBlob = blob;
        const preview = document.getElementById('reviewPhotoPreview');
        if(preview){ preview.innerHTML = `<img src="${canvas.toDataURL('image/jpeg', 0.7)}" alt="">`; }
      }, 'image/jpeg', 0.75);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function escapeHTML(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

async function submitReview(){
  const nameEl = document.getElementById('reviewName');
  const textEl = document.getElementById('reviewText');
  const btn = document.querySelector('.review-submit');
  const name = (nameEl.value || '').trim();
  const text = (textEl.value || '').trim();
  if(!name || !text){
    alert(state.lang === 'it' ? 'Inserisci nome e commento.' : 'Please enter your name and comment.');
    return;
  }

  btn.disabled = true;
  btn.textContent = state.lang === 'it' ? 'Pubblicazione...' : 'Posting...';

  try{
    let photo_url = null;
    if(reviewFormPhotoBlob){
      const fileName = `review_${Date.now()}_${Math.random().toString(36).slice(2)}.jpg`;
      const { error: uploadError } = await sb.storage.from('review-photos').upload(fileName, reviewFormPhotoBlob, { contentType: 'image/jpeg' });
      if(uploadError) throw uploadError;
      const { data: urlData } = sb.storage.from('review-photos').getPublicUrl(fileName);
      photo_url = urlData.publicUrl;
    }

    const { error: insertError } = await sb.from('reviews').insert({
      name, review_text: text, rating: reviewFormRating, photo_url
    });
    if(insertError) throw insertError;

    reviewFormRating = 5;
    reviewFormPhotoBlob = null;
    await loadReviewsFromDB();
    renderRecensioni();
  } catch(err){
    console.error(err);
    alert(state.lang === 'it' ? 'Errore nel pubblicare la recensione. Riprova.' : 'Error posting the review. Please try again.');
    btn.disabled = false;
    btn.textContent = t('submitReview');
  }
}

async function voteHelpful(id){
  const voted = getVotedSet();
  if(voted.has(id)) return;
  voted.add(id);
  saveVotedSet(voted);
  try{
    const { error } = await sb.rpc('increment_helpful', { review_id: id });
    if(error) throw error;
    await loadReviewsFromDB();
    renderRecensioni();
  } catch(err){
    console.error('Errore voto utile:', err);
  }
}

  root.innerHTML = `

    <div class="screen">
      <div class="section-title-top">
        <div class="title-caps">${t('recensioniTitle')}</div>
      </div>
      <div class="content-col">
        <div class="review-summary">
          ${renderStars(avg,false)}
          <p class="review-avg-text">${avg.toFixed(1)} · ${t('basedOn')} ${reviews.length} ${t('reviewsWord')}</p>
        </div>

        <div class="review-form">
          <p class="review-form-title">${t('writeReview')}</p>
          <label class="review-label">${t('yourRating')}</label>
          ${renderStars(reviewFormRating, true)}
          <label class="review-label">${t('yourName')}</label>
          <input type="text" id="reviewName" class="review-input" maxlength="60">
          <label class="review-label">${t('yourComment')}</label>
          <textarea id="reviewText" class="review-textarea" rows="3" maxlength="400"></textarea>
          <label class="review-label">${t('addPhoto')}</label>
          <input type="file" accept="image/*" class="review-file" onchange="onReviewPhotoChange(this)">
          <div id="reviewPhotoPreview" class="review-photo-preview"></div>
          <button class="review-submit" onclick="submitReview()">${t('submitReview')}</button>
        </div>

        <div class="review-list">${listHTML}</div>
      </div>
      ${venueInfoHTML()}
    </div>
  `;
}

function renderStoria(){
  root.innerHTML = `
    ${screenHeaderHTML()}
    <div class="screen">
      <div class="section-title-top">
        <div class="title-caps">${t('storiaTitle')}</div>
      </div>
      <div class="content-col">
        <p class="storia-text">${t('storiaText')}</p>
      </div>
      ${venueInfoHTML()}
    </div>
  `;
}

function renderHome(){
  const cards = Object.keys(MENU).map(key=>{
    const sec = MENU[key];
    return `<button class="section-card" onclick="openSection('${key}')" aria-label="${tr(sec.title)}">
      <span aria-hidden="true">${iconFor(sec.icon || key)}</span>
      <div class="label">${tr(sec.title)}</div>
    </button>`;
  }).join('');

  root.innerHTML = `
    <div class="home">
      <div class="home-inner">
        <img class="brand-logo" src="${LOGO_SRC}" alt="Gustavo">
        <div class="brand-tagline">${t('tagline')}</div>

        <div class="home-links-row">
          <button class="storia-link-inline" onclick="openStoria()">${t('storiaLink')} →</button>
          <button class="storia-link-inline" onclick="openRecensioni()">${t('recensioniTitle')} →</button>
        </div>

        <div class="section-grid">${cards}</div>
        <div class="home-footnote">${t('footnote')}</div>
      </div>
      ${venueInfoHTML()}
    </div>
  `;
}

function screenHeaderHTML(){
  return `
    <header class="topbar">
      <button class="back" onclick="goHome()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>
        ${t('back')}
      </button>
      <div class="mini-brand">
        <img src="${LOGO_SRC}" alt="Gustavo" class="mini-brand-logo">
        <div class="mini-brand-sub">${t('miniBrandSub')}</div>
      </div>
    </header>
  `;
}

function venueInfoHTML(){
  const address = VENUE.address ? tr(VENUE.address) : 'Plaza Félix Estévez, 3, 35660 Corralejo, Las Palmas';
  const hours = VENUE.hours ? tr(VENUE.hours) : '—';
  const phone = VENUE.phone ? tr(VENUE.phone) : 'da aggiungere';
  return `
    <div class="venue-info">
      <div class="info-col">
        <div class="info-label">${t('locLabel')}</div>
        <div class="info-line">${address}</div>
      </div>
      <div class="info-col">
        <div class="info-label">${t('hoursLabel')}</div>
        <div class="info-line">${hours}</div>
      </div>
      <div class="info-col">
        <div class="info-label">${t('contactLabel')}</div>
        <div class="info-line">${phone}</div>
      </div>
    </div>
  `;
}

function renderItemRow(it, i, crumb){
  return `
    <div class="item" style="animation-delay:${(i||0)*0.09}s" onclick="toggleTap(this)" role="button" tabindex="0" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();toggleTap(this);}">
      <div class="item-main">
        ${crumb ? `<p class="item-crumb">${crumb}</p>` : ''}
        <p class="item-name">${tr(it.name)}${it.recommended ? `<span class="badge-recommended">${t('recommended')}</span>` : ''}</p>
        <p class="item-ingredients">${tr(it.ingredients)}</p>
        ${it.allergens && it.allergens.length ? `<div class="allergen-row">${it.allergens.map(a=>`<span class="allergen-icon" title="${UI[state.lang].allergenLabels[a]||a}" aria-label="${UI[state.lang].allergenLabels[a]||a}">${allergenIcon(a)}</span>`).join('')}</div>` : ''}
      </div>
      <div class="item-price">${it.price}</div>
    </div>
  `;
}

function renderSection(){
  const sec = MENU[state.section];
  const hasSub = !!sec.subcategories;
  let subKey = state.sub;
  if(hasSub && !subKey){ subKey = Object.keys(sec.subcategories)[0]; }

  let chipRow = '';
  let items = [];
  let topTitle = tr(sec.title);

  if(hasSub){
    chipRow = `<div class="chip-row">` + Object.keys(sec.subcategories).map(k=>{
      const active = k === subKey ? 'active' : '';
      return `<button class="chip ${active}" onclick="selectSub('${k}')">${tr(sec.subcategories[k].title)}</button>`;
    }).join('') + `</div>`;
    items = sec.subcategories[subKey].items;
  } else {
    items = sec.items || [];
  }

  const isWineTab = state.section === 'bebidas' && subKey === 'vini';
  const itemsHTML = items.length ? items.map((it,i)=>renderItemRow(it,i)).join('') : `<div class="empty-note">${t('empty')}</div>`;

  root.innerHTML = `
    ${screenHeaderHTML()}
    <div class="screen">
      <div class="section-title-top">
        <div class="title-caps">${topTitle}</div>
        <div class="title-script">${t('menuWord')}</div>
      </div>
      <div class="content-col">
        ${chipRow}
        <div class="allergen-disclaimer">${t('allergenDisclaimer')}</div>
        ${isWineTab ? `<div class="wine-pairing-note">${t('winePairingNote')}</div>` : ''}
        <div class="item-list">${itemsHTML}</div>
        <div class="closing-note">${t('closingNote')}</div>
      </div>
      ${venueInfoHTML()}
    </div>
  `;
}

function toggleTap(el){
  el.classList.toggle('tapped');
}

function openSection(key){
  state.screen = 'section';
  state.section = key;
  state.sub = null;
  render();
  window.scrollTo(0,0);
}
function selectSub(k){
  state.sub = k;
  render();
}
function goHome(){
  state.screen = 'home'; state.section = null; state.sub = null;
  render();
  window.scrollTo(0,0);
}

/* --- schermata di benvenuto: resta finché il cliente non sceglie una lingua --- */
function closeSplash(){
  const splash = document.getElementById('splash');
  if(!splash) return;
  splash.classList.add('hide');
  setTimeout(()=>{ splash.remove(); }, 700);
}

function chooseLangFromSplash(l){
  state.lang = l;
  document.documentElement.setAttribute('lang', l);
  render();
  closeSplash();
}

document.getElementById('splashLogo').src = LOGO_SRC;
document.getElementById('splashLangRow').innerHTML = `<span class="splash-loading">···</span>`;

(async function init(){
  try{
    await loadMenuData();
  }catch(err){
    console.error('Errore caricamento dati dal menu (Supabase):', err);
  }
  document.getElementById('splashLangRow').innerHTML = LANGS.map(l=>
    `<button class="splash-lang-btn" onclick="chooseLangFromSplash('${l}')">${LANG_FULL_LABEL[l]}</button>`
  ).join('');
})();

</script>
</body>
</html>
